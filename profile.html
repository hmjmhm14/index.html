<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Личный кабинет</title>
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; color: white;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; padding-top: 50px;
        }
        .profile-container {
            width: 1000px; background-color: rgba(0, 0, 0, 0.8); border-radius: 20px; padding: 30px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-profile { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.3); 
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; 
        }
        .cat-name-big { font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
        .cat-id { font-size: 18px; color: #aaa; }

        /* ОСНОВНАЯ СЕТКА: Лево (Профиль) и Право (Меню) */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 300px; /* Левая часть шире, правая под кнопки */
            gap: 30px;
        }

        /* ЛЕВАЯ ЧАСТЬ: Данные персонажа */
        .left-side { display: flex; flex-direction: column; gap: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .info-item { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; 
            border-left: 4px solid #fff; 
        }
        .info-label { font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 18px; }

        /* ПРАВАЯ ЧАСТЬ: Игровое меню */
        .right-menu { display: flex; flex-direction: column; gap: 12px; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .menu-btn:hover {
            background: #fff;
            color: #000;
            transform: translateX(-5px);
        }
        .menu-btn.active { border-color: #fff; background: rgba(255, 255, 255, 0.15); }

        .btn-back { 
            align-self: flex-start; background: transparent; border: 1px solid white; 
            color: white; padding: 8px 15px; cursor: pointer; text-decoration: none; font-size: 12px;
        }
        .cat-avatar-small {
            width: 100%; height: 200px; border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px; background: rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="menu_regist.html" class="btn-back" onclick="logout()">← ВЫЙТИ ИЗ АККАУНТА</a>
        
        <div class="header-profile">
            <div class="cat-name-big" id="display-name">Загрузка...</div>
            <div class="cat-id">ID: <span id="display-id">0.00</span></div>
        </div>

        <div class="main-grid">
            <div class="left-side">
                <div class="cat-avatar-small">ОКРАС / ПЕРСОНАЖ</div>
                <div class="info-grid">
                    <div class="info-item"><div class="info-label">Племя</div><div class="info-value" id="display-tribe">-</div></div>
                    <div class="info-item"><div class="info-label">Пол</div><div class="info-value" id="display-gender">-</div></div>
                    <div class="info-item"><div class="info-label">Дата рождения</div><div class="info-value" id="display-date">-</div></div>
                    <div class="info-item"><div class="info-label">Известные клички</div><div class="info-value" id="display-nicknames">-</div></div>
                </div>
            </div>

            <div class="right-menu">
                <a href="#" class="menu-btn active">Игровая</a>
                <a href="#" class="menu-btn">Группы / Чаты</a>
                <a href="#" class="menu-btn">ЛС (Сообщения)</a>
                <a href="#" class="menu-btn">Новости</a>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('userId');
        }

        window.onload = function() {
            const currentId = localStorage.getItem('userId');
            const savedData = localStorage.getItem('catProfile_' + currentId);
            
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-id').textContent = profile.id;
                document.getElementById('display-tribe').textContent = profile.tribe;
                document.getElementById('display-gender').textContent = profile.gender;
                document.getElementById('display-date').textContent = profile.birthDate;
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
            } else {
                window.location.href = 'menu_regist.html';
            }
        };
    </script>
</body>
</html>
