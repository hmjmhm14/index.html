<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Профиль</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Общий контейнер на весь экран */
        .screen-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.4); /* Затемнение фона для четкости */
        }

        /* Верхняя панель с именем и выходом */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .cat-name-title { font-size: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        /* СЕТКА ИЗ ТРЕХ КВАДРАТОВ */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 300px; /* Квадрат - Инфа - Квадрат */
            gap: 25px;
            height: 100%;
            max-height: 600px; /* Чтобы не растягивалось слишком сильно */
        }

        /* Общий стиль для всех трех блоков */
        .block-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 1. ЛЕВЫЙ КВАДРАТ (ОКРАС) */
        .avatar-display {
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            letter-spacing: 2px;
            color: #888;
        }

        /* 2. ЦЕНТРАЛЬНЫЙ БЛОК (ИНФА) */
        .info-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto; /* На случай длинного текста */
        }

        .info-row {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #fff;
        }

        .label { font-size: 10px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
        .value { font-size: 18px; letter-spacing: 1px; }

        /* 3. ПРАВЫЙ КВАДРАТ (КНОПКИ) */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            height: 100%;
        }

        .nav-btn {
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.02);
        }

        .btn-logout {
            background: #900;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="screen-wrapper">
        <div class="top-bar">
            <div class="cat-name-title" id="display-name">ИМЯ КОТА</div>
            <button class="btn-logout" onclick="exit()">ВЫЙТИ</button>
        </div>

        <div class="main-layout">
            
            <div class="block-panel">
                <h3 style="text-align:center; margin-top:0;">ОКРАС</h3>
                <div class="avatar-display">
                    [ МЕСТО ДЛЯ ФОТО ]
                </div>
            </div>

            <div class="block-panel">
                <h3 style="text-align:center; margin-top:0;">ИНФОРМАЦИЯ</h3>
                <div class="info-content">
                    <div class="info-row"><div class="label">ID ПЕРСОНАЖА</div><div class="value" id="display-id">...</div></div>
                    <div class="info-row"><div class="label">ПЛЕМЯ / КЛАН</div><div class="value" id="display-tribe">...</div></div>
                    <div class="info-row"><div class="label">ПОЛ</div><div class="value" id="display-gender">...</div></div>
                    <div class="info-row"><div class="label">ДЕНЬ РОЖДЕНИЯ</div><div class="value" id="display-date">...</div></div>
                    <div class="info-row"><div class="label">КЛИЧКИ</div><div class="value" id="display-nicknames">...</div></div>
                </div>
            </div>

            <div class="block-panel">
                <h3 style="text-align:center; margin-top:0;">МЕНЮ</h3>
                <div class="menu-list">
                    <a href="#" class="nav-btn">Игровая</a>
                    <a href="#" class="nav-btn">Группы / Чаты</a>
                    <a href="#" class="nav-btn">Личные сообщения</a>
                    <a href="#" class="nav-btn">Новости</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function exit() {
            localStorage.removeItem('userId');
            window.location.href = 'menu_regist.html';
        }

        window.onload = function() {
            const currentId = localStorage.getItem('userId');
            const savedData = localStorage.getItem('catProfile_' + currentId);
            
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-id').textContent = profile.id;
                document.getElementById('display-tribe').textContent = profile.tribe;
                document.getElementById('display-gender').textContent = profile.gender;
                document.getElementById('display-date').textContent = profile.birthDate;
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
            } else {
                window.location.href = 'menu_regist.html';
            }
        };
    </script>
</body>
</html>
