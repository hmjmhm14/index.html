<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Профиль</title>
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%; font-family: 'Segoe UI', sans-serif; color: white;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center;
        }

        .profile-wrapper {
            width: 1100px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Верхняя панель с именем и кнопкой выхода */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
        }

        .cat-name-header { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }

        .btn-exit {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #ff4444; }

        /* Основная сетка */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr; /* Левая узкая колонка и правая широкая */
            gap: 30px;
        }

        /* ЛЕВАЯ КОЛОНКА (Окрас + Меню) */
        .left-aside {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
            display: block;
        }

        .avatar-box {
            width: 100%;
            height: 350px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: white; }

        /* ПРАВАЯ КОЛОНКА (Инфо) */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid white;
        }

        .label { font-size: 13px; color: #aaa; text-transform: uppercase; }
        .value { font-size: 18px; font-weight: 500; }
        
        /* Поля, которые можно менять */
        .editable { border-bottom: 1px dashed #777; cursor: pointer; }
        .editable:hover { color: #5181b8; border-color: #5181b8; }

        /* Блок "О себе" */
        .about-me-box {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
        }

    </style>
</head>
<body>

<div class="profile-wrapper">
    <div class="top-bar">
        <div class="cat-name-header">ЧАСТОКОЛ</div>
        <a href="menu_regist.html" class="btn-exit" onclick="logout()">ВЫЙТИ</a>
    </div>

    <div class="main-grid">
        <div class="left-aside">
            <div>
                <span class="section-label">ОКРАС / ПЕРСОНАЖ</span>
                <div class="avatar-box">ФОТО КОТА</div>
            </div>
            
            <div class="menu-buttons">
                <span class="section-label">МЕНЮ</span>
                <div class="menu-btn">Игровая</div>
                <div class="menu-btn">Группы / Чаты</div>
                <div class="menu-btn">Личные сообщения</div>
                <div class="menu-btn">Новости</div>
            </div>
        </div>

        <div class="info-panel">
            <span class="section-label" style="text-align: left;">ИНФОРМАЦИЯ</span>
            
            <div class="info-row">
                <span class="label">ID Персонажа</span>
                <span class="value" id="display-id">0.00</span>
            </div>

            <div class="info-row">
                <span class="label">Имя (можно менять)</span>
                <span class="value editable" id="display-name" onclick="editField('name')">...</span>
            </div>

            <div class="info-row">
                <span class="label">Племя / Клан</span>
                <span class="value" id="display-tribe">-</span>
            </div>

            <div class="info-row">
                <span class="label">Пол</span>
                <span class="value" id="display-gender">-</span>
            </div>

            <div class="info-row">
                <span class="label">День рождения</span>
                <span class="value" id="display-date">-</span>
            </div>

            <div class="info-row">
                <span class="label">Клички (можно менять)</span>
                <span class="value editable" id="display-nicknames" onclick="editField('nicknames')">-</span>
            </div>

            <span class="section-label" style="text-align: left; margin-top: 20px;">О СЕБЕ</span>
            <div class="about-me-box" id="about-me-content">
                Здесь будет твоя история...
            </div>
        </div>
    </div>
</div>

<script>
    function logout() {
        localStorage.removeItem('userId');
    }

    // Загрузка данных
    window.onload = function() {
        const currentId = localStorage.getItem('userId');
        const savedData = localStorage.getItem('catProfile_' + currentId);
        
        if (savedData) {
            const profile = JSON.parse(savedData);
            document.getElementById('display-name').textContent = profile.name;
            document.getElementById('display-id').textContent = profile.id;
            document.getElementById('display-tribe').textContent = profile.tribe;
            document.getElementById('display-gender').textContent = profile.gender;
            document.getElementById('display-date').textContent = profile.birthDate;
            document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
        } else {
            window.location.href = 'menu_regist.html';
        }
    };

    // Функция для редактирования Имени и Кличек
    function editField(field) {
        const currentId = localStorage.getItem('userId');
        let profile = JSON.parse(localStorage.getItem('catProfile_' + currentId));
        
        if (field === 'name') {
            let newName = prompt("Введите новое имя:", profile.name);
            if (newName) {
                profile.name = newName;
                document.getElementById('display-name').textContent = newName;
            }
        } else if (field === 'nicknames') {
            let newNicks = prompt("Введите клички через запятую:", profile.nicknames.join(', '));
            if (newNicks) {
                profile.nicknames = newNicks.split(',').map(s => s.trim());
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ');
            }
        }
        
        localStorage.setItem('catProfile_' + currentId, JSON.stringify(profile));
    }
</script>

</body>
</html>
