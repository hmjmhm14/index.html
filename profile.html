<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Личный кабинет</title>
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; color: white;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; padding-top: 30px;
        }
        .profile-container {
            width: 1200px; /* Увеличил ширину, чтобы влезли 3 колонки */
            background-color: rgba(0, 0, 0, 0.85); 
            border-radius: 20px; padding: 25px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-profile { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .cat-name-big { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }

        /* ТРЕХКОЛОННАЯ СЕТКА */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 280px; /* Лево, Центр, Право */
            gap: 20px;
            align-items: start;
        }

        /* 1. ЛЕВАЯ КОЛОНКА (ОКРАС) */
        .left-col .cat-avatar-box {
            width: 100%; height: 350px; 
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
        }

        /* 2. ЦЕНТРАЛЬНАЯ КОЛОНКА (ДАННЫЕ) */
        .center-col { display: flex; flex-direction: column; gap: 15px; }
        .info-card { 
            background: rgba(255, 255, 255, 0.05); padding: 12px 18px; border-radius: 8px; 
            border-left: 3px solid #fff; 
        }
        .info-label { font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 3px; }
        .info-value { font-size: 16px; }

        /* 3. ПРАВАЯ КОЛОНКА (МЕНЮ) */
        .right-col { display: flex; flex-direction: column; gap: 10px; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 15px; text-align: center;
            text-decoration: none; text-transform: uppercase; font-size: 13px;
            border-radius: 8px; transition: 0.3s; cursor: pointer;
        }
        .menu-btn:hover { background: #fff; color: #000; }
        .menu-btn.active { background: rgba(255, 255, 255, 0.2); border-color: #fff; }

        .btn-exit { 
            background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; 
            padding: 6px 12px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 11px;
        }
        .btn-exit:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="header-profile">
            <div class="cat-name-big" id="display-name">Загрузка...</div>
            <a href="menu_regist.html" class="btn-exit" onclick="logout()">ВЫЙТИ</a>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="cat-avatar-box">ОКРАС</div>
            </div>

            <div class="center-col">
                <div class="info-card"><div class="info-label">ID</div><div class="info-value" id="display-id">0.00</div></div>
                <div class="info-card"><div class="info-label">Племя</div><div class="info-value" id="display-tribe">-</div></div>
                <div class="info-card"><div class="info-label">Пол</div><div class="info-value" id="display-gender">-</div></div>
                <div class="info-card"><div class="info-label">Дата рождения</div><div class="info-value" id="display-date">-</div></div>
                <div class="info-card"><div class="info-label">Кличка</div><div class="info-value" id="display-nicknames">-</div></div>
            </div>

            <div class="right-col">
                <a href="#" class="menu-btn active">Игровая</a>
                <a href="#" class="menu-btn">Группы / Чаты</a>
                <a href="#" class="menu-btn">ЛС (Личные Сообщения)</a>
                <a href="#" class="menu-btn">Новости</a>
            </div>
        </div>
    </div>

    <script>
        function logout() { localStorage.removeItem('userId'); }

        window.onload = function() {
            const currentId = localStorage.getItem('userId');
            const savedData = localStorage.getItem('catProfile_' + currentId);
            
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-id').textContent = profile.id;
                document.getElementById('display-tribe').textContent = profile.tribe;
                document.getElementById('display-gender').textContent = profile.gender;
                document.getElementById('display-date').textContent = profile.birthDate;
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
            } else {
                window.location.href = 'menu_regist.html';
            }
        };
    </script>
</body>
</html>
