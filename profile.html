<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Профиль</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover;
            /* Центрируем всё содержимое body */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Тот самый компактный блок по центру (как на рисунке) */
        .main-wrapper {
            width: 1100px; /* Оптимальная ширина, чтобы не на весь экран */
            height: 75vh;  /* Высота на 75% экрана */
            background: rgba(0, 0, 0, 0.6); /* Полупрозрачный темный фон */
            backdrop-filter: blur(5px);    /* Легкое размытие заднего фона */
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .cat-name-title { 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* СЕТКА ИЗ ТРЕХ ПАНЕЛЕЙ */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 260px; /* Компактные бока, широкая середина */
            gap: 20px;
            height: 100%;
        }

        .panel {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* ОКРАС */
        .avatar-zone {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            color: #666;
        }

        /* ИНФОРМАЦИЯ */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .info-box {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #fff;
        }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .val { font-size: 16px; margin-top: 2px; }

        /* МЕНЮ */
        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-link {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            border-radius: 6px;
            transition: 0.2s;
        }
        .nav-link:hover { background: #fff; color: #000; }

        .btn-exit {
            background: #722;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #a22; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="cat-name-title" id="display-name">ЗАГРУЗКА...</div>
            <button class="btn-exit" onclick="exit()">ВЫЙТИ</button>
        </div>

        <div class="main-layout">
            
            <div class="panel">
                <h4 style="margin: 0 0 15px 0; text-align: center; color: #aaa;">ОКРАС</h4>
                <div class="avatar-zone">ФОТО КОТА</div>
            </div>

            <div class="panel">
                <h4 style="margin: 0 0 15px 0; text-align: center; color: #aaa;">ДАННЫЕ ПЕРСОНАЖА</h4>
                <div class="info-list">
                    <div class="info-box"><div class="label">ID</div><div class="val" id="display-id">...</div></div>
                    <div class="info-box"><div class="label">Племя</div><div class="val" id="display-tribe">...</div></div>
                    <div class="info-box"><div class="label">Пол</div><div class="val" id="display-gender">...</div></div>
                    <div class="info-box"><div class="label">Рождение</div><div class="val" id="display-date">...</div></div>
                    <div class="info-box"><div class="label">Клички</div><div class="val" id="display-nicknames">...</div></div>
                </div>
            </div>

            <div class="panel">
                <h4 style="margin: 0 0 15px 0; text-align: center; color: #aaa;">МЕНЮ</h4>
                <div class="menu-btns">
                    <a href="#" class="nav-link">Игровая</a>
                    <a href="#" class="nav-link">Группы / Чаты</a>
                    <a href="#" class="nav-link">Сообщения</a>
                    <a href="#" class="nav-link">Новости</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function exit() {
            localStorage.removeItem('userId');
            window.location.href = 'menu_regist.html';
        }

        window.onload = function() {
            const currentId = localStorage.getItem('userId');
            const savedData = localStorage.getItem('catProfile_' + currentId);
            
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-id').textContent = profile.id;
                document.getElementById('display-tribe').textContent = profile.tribe;
                document.getElementById('display-gender').textContent = profile.gender;
                document.getElementById('display-date').textContent = profile.birthDate;
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
            } else {
                window.location.href = 'menu_regist.html';
            }
        };
    </script>
</body>
</html>
