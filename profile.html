<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Мой Кот</title>
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; color: white;
            background: url('https://i.ibb.co/RGXR1DyG/image.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; padding-top: 50px;
        }
        .profile-container {
            width: 900px; background-color: rgba(0, 0, 0, 0.7); border-radius: 15px; padding: 30px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 20px;
        }
        .header-profile { border-bottom: 1px solid rgba(255, 255, 255, 0.3); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .cat-name-big { font-size: 32px; text-transform: uppercase; }
        .cat-id { font-size: 18px; color: #aaa; }
        .main-content { display: flex; gap: 30px; }
        .cat-avatar { width: 300px; height: 300px; border: 1px solid white; display: flex; align-items: center; justify-content: center; }
        .info-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; border-left: 3px solid white; }
        .info-label { font-size: 12px; text-transform: uppercase; color: #aaa; }
        .info-value { font-size: 18px; }
        .btn-back { align-self: flex-start; background: transparent; border: 1px solid white; color: white; padding: 10px 20px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="menu_regist.html" class="btn-back" onclick="logout()">← ВЫХОД</a>
        <div class="header-profile">
            <div class="cat-name-big" id="display-name">...</div>
            <div class="cat-id">ID: <span id="display-id">0.00</span></div>
        </div>
        <div class="main-content">
            <div class="cat-avatar">ОКРАС</div>
            <div class="info-grid">
                <div class="info-item"><div class="info-label">Племя</div><div class="info-value" id="display-tribe">-</div></div>
                <div class="info-item"><div class="info-label">Пол</div><div class="info-value" id="display-gender">-</div></div>
                <div class="info-item"><div class="info-label">Дата</div><div class="info-value" id="display-date">-</div></div>
                <div class="info-item"><div class="info-label">Клички</div><div class="info-value" id="display-nicknames">-</div></div>
            </div>
        </div>
    </div>
    <script>
        function logout() {
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userId');
        }

        window.onload = function() {
            const currentId = localStorage.getItem('userId');
            const savedData = localStorage.getItem('catProfile_' + currentId);
            
            if (savedData) {
                const profile = JSON.parse(savedData);
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-id').textContent = profile.id;
                document.getElementById('display-tribe').textContent = profile.tribe;
                document.getElementById('display-gender').textContent = profile.gender;
                document.getElementById('display-date').textContent = profile.birthDate;
                document.getElementById('display-nicknames').textContent = profile.nicknames.join(', ') || "Нет";
            } else {
                window.location.href = 'menu_regist.html';
            }
        };
    </script>
</body>
</html>
