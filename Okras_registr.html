<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Редактор</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .editor-container {
            width: 1200px; height: 900px;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 420px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        /* ЛЕВАЯ ЧАСТЬ */
        .preview-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .cat-display-wrapper {
            width: 550px; height: 550px;
            position: relative;
            /* Убрали фон и границы сзади модельки */
            background: transparent; 
            margin-bottom: 20px;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat;
            background-position: center center; transition: 0.2s;
        }

        /* ПРАВАЯ ЧАСТЬ */
        .selector-side {
            display: flex; flex-direction: column; padding: 25px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            height: 100%; box-sizing: border-box;
        }

        .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #4caf50; }

        /* Фикс: Ограниченная зона выбора с прокруткой */
        .scroll-area {
            height: 320px; /* Фиксированная высота, чтобы не вылетало */
            overflow-y: auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .okras-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 12px;
            cursor: pointer; text-align: center; border: 1px solid transparent;
        }
        .okras-card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.15); }

        .okras-img-mini { height: 70px; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 8px; }

        /* УПРАВЛЕНИЕ СЛОЯМИ */
        .layers-control {
            background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 10px;
            max-height: 250px; overflow-y: auto;
        }
        .layer-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 5px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .layer-btns button {
            background: #333; border: none; color: white; width: 24px; height: 24px;
            border-radius: 4px; cursor: pointer; margin-left: 3px;
        }

        .save-btn {
            margin-top: auto; background: #4caf50; border: none;
            padding: 18px; border-radius: 10px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
        }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="preview-side">
        <div class="cat-display-wrapper" id="cat-viewport"></div>
        <div style="font-size: 18px; letter-spacing: 4px; color: #555; font-weight: bold;">РЕДАКТОР ПЕРСОНАЖА</div>
    </div>

    <div class="selector-side">
        <div class="tabs" id="category-tabs"></div>
        
        <div class="scroll-area" id="items-list"></div>

        <div style="font-size: 11px; color: #777; margin-bottom: 8px; text-transform: uppercase;">Порядок деталей (Слои)</div>
        <div class="layers-control" id="layers-stack"></div>

        <button class="save-btn" onclick="confirmCharacter()">Завершить создание</button>
    </div>
</div>

<script>
    // Порядок слоев: Моделька (base) на Z: 50, Окрас (body) на Z: 40 (сзади неё)
    let layers = [
        { id: 'bangs', name: 'Челка', z: 90, currentImg: '' },
        { id: 'ears', name: 'Уши', z: 80, currentImg: '' },
        { id: 'cheeks', name: 'Щеки', z: 70, currentImg: '' },
        { id: 'mane', name: 'Грива', z: 60, currentImg: '' },
        { id: 'base', name: 'Моделька кота (Контур)', z: 50, currentImg: 'https://psv4.userapi.com/s/v1/d2/u5MmjzAnQPxd78Vum6JpQEWND6fUYiR240LOMRlpBRz4rYk-XuuYyUy_RPl_aiYklec5yg8AcHioyzgTE7mAdS2EzmzkrSNkKxhvNN658UgrQAjaugmBPahou67ye1ET-9YwX5xbvZkO/IMG_8072.png' },
        { id: 'body', name: 'Окрас тела (Сзади)', z: 40, currentImg: '' },
        { id: 'belly', name: 'Живот', z: 30, currentImg: '' },
        { id: 'tail', name: 'Хвост', z: 20, currentImg: '' }
    ];

    const library = {
        body: [
            { id: 'white', name: 'Белый', img: 'https://psv4.userapi.com/s/v1/d2/YuXGokbsOuLU8Kj9jWXCv7kgpDvBOKitH2KKzGaVbVqqcUMnZX5yXYoTt-SIZ_7y73wwtS3CdnnO1PefrFRlv5fbmdcLH_cgW6Lr_T4s-xZ1tBc45XsBJwsd9rcBpNYvUBn0XBrSOKg2/IMG_8103.png' },
            { id: 'black', name: 'Черный', img: 'https://psv4.userapi.com/s/v1/d2/1JBuWj7BxdwpksiW2e3415tfG8m6s3XHIv2ed8o841j0w3Wm-FxQM0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8078.png' },
            { id: 'brown', name: 'Коричневый', img: 'https://psv4.userapi.com/s/v1/d2/8G22l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8080.png' },
            { id: 'dirty', name: 'Грязный', img: 'https://psv4.userapi.com/s/v1/d2/X29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8081.png' },
            { id: 'purple', name: 'Фиолетовый', img: 'https://psv4.userapi.com/s/v1/d2/P29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8083.png' },
            { id: 'blue', name: 'Светло-голубой', img: 'https://psv4.userapi.com/s/v1/d2/k29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8084.png' },
            { id: 'ginger', name: 'Рыжий', img: 'https://psv4.userapi.com/s/v1/d2/kELWKDbzGvukdiC6mkY7NES0E1MIkkNHK9jPVwN3dLQEgRbHduTKIzDk5DeZ_cEYdtJJQ8WVxO2kGefa1r3wnzI2TmYmGhyOKbDsjcUf2a7AWavEyg_DTBsVAzXR5lk5tDQRl2SIZ7hU/IMG_8086.png' }
        ],
        tail: [], belly: [], cheeks: [], mane: [], ears: [], bangs: []
    };

    let activeTab = 'body';

    function init() {
        // Ставим белый цвет по умолчанию
        layers.find(l => l.id === 'body').currentImg = library.body[0].img;
        renderViewport();
        renderTabs();
        renderItems();
        renderLayerControls();
    }

    function renderViewport() {
        const viewport = document.getElementById('cat-viewport');
        viewport.innerHTML = '';
        layers.forEach(layer => {
            const div = document.createElement('div');
            div.id = 'layer-' + layer.id;
            div.className = 'layer';
            div.style.zIndex = layer.z;
            div.style.backgroundImage = layer.currentImg ? `url(${layer.currentImg})` : 'none';
            viewport.appendChild(div);
        });
    }

    function renderTabs() {
        const container = document.getElementById('category-tabs');
        container.innerHTML = '';
        layers.forEach(l => {
            if(l.id === 'base') return;
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTab === l.id ? 'active' : ''}`;
            btn.innerText = l.name.split(' (')[0];
            btn.onclick = () => { activeTab = l.id; renderTabs(); renderItems(); };
            container.appendChild(btn);
        });
    }

    function renderItems() {
        const container = document.getElementById('items-list');
        container.innerHTML = '';
        const items = library[activeTab] || [];
        items.forEach(item => {
            const isActive = layers.find(l => l.id === activeTab).currentImg === item.img;
            const card = document.createElement('div');
            card.className = `okras-card ${isActive ? 'active' : ''}`;
            card.innerHTML = `<div class="okras-img-mini" style="background-image:url(${item.img})"></div><div style="font-size:10px;">${item.name}</div>`;
            card.onclick = () => {
                layers.find(l => l.id === activeTab).currentImg = item.img;
                document.getElementById('layer-' + activeTab).style.backgroundImage = `url(${item.img})`;
                renderItems();
            };
            container.appendChild(card);
        });
    }

    function renderLayerControls() {
        const container = document.getElementById('layers-stack');
        container.innerHTML = '';
        [...layers].sort((a,b) => b.z - a.z).forEach(layer => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `
                <span>${layer.name.split(' (')[0]}</span>
                <div class="layer-btns">
                    <button onclick="moveLayer('${layer.id}', 1)">↑</button>
                    <button onclick="moveLayer('${layer.id}', -1)">↓</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function moveLayer(id, delta) {
        const layer = layers.find(l => l.id === id);
        layer.z += delta;
        document.getElementById('layer-' + id).style.zIndex = layer.z;
        renderLayerControls();
    }

    function confirmCharacter() {
        const currentId = localStorage.getItem('userId');
        let profile = JSON.parse(localStorage.getItem('catProfile_' + currentId)) || {};
        profile.appearance = layers;
        localStorage.setItem('catProfile_' + currentId, JSON.stringify(profile));
        window.location.href = 'profile.html';
    }

    init();
</script>
</body>
</html>
