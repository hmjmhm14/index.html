<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Редактор</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        .editor-container {
            width: 1100px; height: 850px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 380px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .preview-side { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cat-viewport { width: 500px; height: 500px; position: relative; }
        .layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; }
        .selector-side { display: flex; flex-direction: column; padding: 25px; border-left: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0,0,0,0.3); }
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 8px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .tab-btn.active { background: #4caf50; }
        .scroll-area { height: 380px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid transparent; }
        .card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .mini-img { height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .layer-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .finish-btn { background: #4caf50; border: none; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="editor-container">

    </div>
    <div class="selector-side">
        <div class="tabs" id="tabs"></div>
        <div class="scroll-area" id="controls"></div>
        <div class="layers-list" id="layers-ui"></div>

</div>

                    { name: "Светло-голубой", img: "https://psv4.userapi.com/s/v1/d2/Sm6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8150.png" },
                    { name: "Темно-голубой", img: "https://psv4.userapi.com/s/v1/d2/Rm6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8149.png" },
                    { name: "Голубой", img: "https://psv4.userapi.com/s/v1/d2/Qm6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8148.png" },
                    { name: "Темно-рыжий", img: "https://psv4.userapi.com/s/v1/d2/Pm6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8422.png" },
                    { name: "Рыжий", img: "https://psv4.userapi.com/s/v1/d2/Om6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8152.png" },
                    { name: "Ярко-рыжий", img: "https://psv4.userapi.com/s/v1/d2/Nm6Vf9qfDj2cD5YdR0uZkhJidIGWeLHwnArRpdNmbAMbCEIhghLn_u_OlNlnyj1vx0J8Rn_Q1VXvdlA9-09vDRUbR_JcFeUl7WjuEMFHo69Rs6v4EBM9kaQWlyoi0caRbVvSTG5yKpxB/IMG_8153.png" }
                ]
            }
        }
    };

    let layers = [
        { id: 'body', name: 'Тело', img: lib.body.colors[0].img, z: 1, movable: true },
        { id: 'tail', name: 'Хвост (Модель)', img: lib.tail.models[0].img, z: 0.5, movable: true, modelId: 'short' },
        { id: 'tail_color', name: 'Хвост (Окрас)', img: lib.tail.colors.short[0].img, z: 0.6, movable: false },
        { id: 'eyes', name: 'Глаза', img: lib.eyes.colors[0].img, z: 2, movable: true }
    ];

    let activeTab = 'body';

    function init() {
        renderTabs();
        renderControls();
        renderAll();
    }

    function renderTabs() {
        const t = document.getElementById('tabs');
        t.innerHTML = '';
        Object.keys(lib).forEach(key => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTab === key ? 'active' : ''}`;
            btn.innerText = lib[activeTab === key ? key : key].name || key;
            btn.onclick = () => { activeTab = key; renderTabs(); renderControls(); };
            t.appendChild(btn);
        });
    }

    function renderControls() {
        const c = document.getElementById('controls');
        c.innerHTML = '';
        const data = lib[activeTab];

        if(activeTab === 'tail') {
            const labelM = document.createElement('div'); labelM.className = 'sub-label'; labelM.innerText = 'Модель хвоста';
            c.appendChild(labelM);
            const gridM = document.createElement('div'); gridM.className = 'grid';
            data.models.forEach(m => {
                const card = createCard(m, () => {
                    const l = layers.find(la => la.id === 'tail');
                    l.img = m.img; l.modelId = m.id;
                    const lc = layers.find(la => la.id === 'tail_color');
                    lc.img = data.colors[m.id][0].img;
                    renderControls(); renderAll();
                }, layers.find(la => la.id === 'tail').img === m.img);
                gridM.appendChild(card);
            });
            c.appendChild(gridM);

            const labelC = document.createElement('div'); labelC.className = 'sub-label'; labelC.innerText = 'Окрас хвоста';
            c.appendChild(labelC);
            const gridC = document.createElement('div'); gridC.className = 'grid';
            const curModelId = layers.find(la => la.id === 'tail').modelId;
            data.colors[curModelId].forEach(col => {
                const card = createCard(col, () => {
                    layers.find(la => la.id === 'tail_color').img = col.img;
                    renderAll(); renderControls();
                }, layers.find(la => la.id === 'tail_color').img === col.img);
                gridC.appendChild(card);
            });
            c.appendChild(gridC);
        } else {
            const grid = document.createElement('div'); grid.className = 'grid';
            data.colors.forEach(item => {
                const card = createCard(item, () => {
                    layers.find(la => la.id === activeTab).img = item.img;
                    renderAll(); renderControls();
                }, layers.find(la => la.id === activeTab).img === item.img);
                grid.appendChild(card);
            });
            c.appendChild(grid);
        }
    }

    function createCard(item, onClick, isActive) {
        const div = document.createElement('div');
        div.className = `card ${isActive ? 'active' : ''}`;
        div.onclick = onClick;
        div.innerHTML = `<div class="mini-img" style="background-image:url(${item.img})"></div><div style="font-size:10px;">${item.name}</div>`;
        return div;
    }

    function renderAll() {
        const v = document.getElementById('viewport');
        v.innerHTML = '';
        [...layers].sort((a,b) => a.z - b.z).forEach(l => {
            const div = document.createElement('div');
            div.className = 'layer';
            div.style.backgroundImage = `url(${l.img})`;
            v.appendChild(div);
        });
        renderLayersUI();
    }

    function renderLayersUI() {
        const ui = document.getElementById('layers-ui');
        ui.innerHTML = '';
        [...layers].filter(l => l.movable).sort((a,b) => b.z - a.z).forEach(l => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `<span>${l.name}</span><div class="layer-btns">
                <button onclick="moveL('${l.id}', 0.1)">↑</button>
                <button onclick="moveL('${l.id}', -0.1)">↓</button>
            </div>`;
            ui.appendChild(item);
        });
    }

    function moveL(id, d) {
        const target = layers.find(l => l.id === id);
        target.z += d;
        if(id === 'tail') layers.find(l => l.id === 'tail_color').z = target.z + 0.01;
        renderAll();
    }

    function saveAndExit() { alert("Персонаж сохранен!"); }

    init();
</script>
</body>
</html>
