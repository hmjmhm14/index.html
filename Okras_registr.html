<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Конструктор</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .editor-container {
            width: 1200px; height: 800px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* ПРЕДПРОСМОТР */
        .preview-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.02); position: relative; padding: 20px;
        }

        .cat-display-wrapper {
            width: 500px; height: 500px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            background: rgba(0,0,0,0.4);
            /* Поднимаем модельку выше, чтобы её было видно */
            margin-bottom: 20px; 
        }

        .layer {
            position: absolute;
            width: 100%; height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom; /* Прижали к низу, чтобы кот "стоял" */
            transition: 0.2s;
        }

        /* КАТЕГОРИИ И ВЫБОР */
        .selector-side { display: flex; flex-direction: column; padding: 20px; border-left: 1px solid rgba(255,255,255,0.1); }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 11px;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #4caf50; }

        .scroll-area {
            flex: 1; overflow-y: auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .okras-card {
            background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px;
            cursor: pointer; text-align: center; border: 1px solid transparent;
        }
        .okras-card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.1); }

        /* УПРАВЛЕНИЕ СЛОЯМИ */
        .layers-control {
            margin-top: 15px; background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 10px; font-size: 12px;
        }
        .layer-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .layer-btns button {
            background: #333; border: none; color: white; padding: 2px 8px;
            border-radius: 3px; cursor: pointer; margin-left: 2px;
        }

        .save-btn {
            margin-top: 15px; background: #4caf50; border: none;
            padding: 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="preview-side">
        <div class="cat-display-wrapper" id="cat-viewport">
            </div>
        <div class="preview-label" id="layer-name">РЕДАКТОР ПЕРСОНАЖА</div>
    </div>

    <div class="selector-side">
        <div class="tabs" id="category-tabs"></div>
        <div class="scroll-area" id="items-list"></div>

        <div class="selector-title" style="margin-top:20px;">Порядок слоёв</div>
        <div class="layers-control" id="layers-stack"></div>

        <button class="save-btn" onclick="confirmCharacter()">Завершить и войти</button>
    </div>
</div>

<script>
    // 1. Конфигурация слоев
    const layers = [
        { id: 'base', name: 'Моделька кота', z: 10, currentImg: 'https://psv4.userapi.com/s/v1/d2/u5MmjzAnQPxd78Vum6JpQEWND6fUYiR240LOMRlpBRz4rYk-XuuYyUy_RPl_aiYklec5yg8AcHioyzgTE7mAdS2EzmzkrSNkKxhvNN658UgrQAjaugmBPahou67ye1ET-9YwX5xbvZkO/IMG_8072.png' },
        { id: 'body', name: 'Окрас тела', z: 5, currentImg: '' },
        { id: 'tail', name: 'Хвост', z: 15, currentImg: '' },
        { id: 'belly', name: 'Живот', z: 12, currentImg: '' },
        { id: 'cheeks', name: 'Щеки', z: 16, currentImg: '' },
        { id: 'mane', name: 'Грива', z: 8, currentImg: '' },
        { id: 'ears', name: 'Уши', z: 18, currentImg: '' },
        { id: 'bangs', name: 'Челка', z: 20, currentImg: '' }
    ];

    // 2. Данные предметов (твои ссылки)
    const library = {
        body: [
            { name: 'Черный', img: 'https://psv4.userapi.com/s/v1/d2/1JBuWj7BxdwpksiW2e3415tfG8m6s3XHIv2ed8o841j0w3Wm-FxQM0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8078.png' },
            { name: 'Белый', img: 'https://psv4.userapi.com/s/v1/d2/YuXGokbsOuLU8Kj9jWXCv7kgpDvBOKitH2KKzGaVbVqqcUMnZX5yXYoTt-SIZ_7y73wwtS3CdnnO1PefrFRlv5fbmdcLH_cgW6Lr_T4s-xZ1tBc45XsBJwsd9rcBpNYvUBn0XBrSOKg2/IMG_8103.png' },
            { name: 'Рыжий', img: 'https://psv4.userapi.com/s/v1/d2/kELWKDbzGvukdiC6mkY7NES0E1MIkkNHK9jPVwN3dLQEgRbHduTKIzDk5DeZ_cEYdtJJQ8WVxO2kGefa1r3wnzI2TmYmGhyOKbDsjcUf2a7AWavEyg_DTBsVAzXR5lk5tDQRl2SIZ7hU/IMG_8086.png' }
            // Добавь сюда остальные свои ссылки...
        ],
        tail: [{ name: 'Базовый хвост', img: 'ссылка_на_хвост' }],
        bangs: [{ name: 'Челка 1', img: 'ссылка_на_челку' }]
    };

    let activeTab = 'body';

    // Инициализация
    function init() {
        renderViewport();
        renderTabs();
        renderItems();
        renderLayerControls();
    }

    function renderViewport() {
        const viewport = document.getElementById('cat-viewport');
        viewport.innerHTML = '';
        layers.forEach(layer => {
            const div = document.createElement('div');
            div.id = 'layer-' + layer.id;
            div.className = 'layer';
            div.style.zIndex = layer.z;
            div.style.backgroundImage = layer.currentImg ? `url(${layer.currentImg})` : 'none';
            viewport.appendChild(div);
        });
    }

    function renderTabs() {
        const container = document.getElementById('category-tabs');
        container.innerHTML = '';
        layers.forEach(l => {
            if(l.id === 'base') return;
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTab === l.id ? 'active' : ''}`;
            btn.innerText = l.name;
            btn.onclick = () => { activeTab = l.id; renderTabs(); renderItems(); };
            container.appendChild(btn);
        });
    }

    function renderItems() {
        const container = document.getElementById('items-list');
        container.innerHTML = '';
        const items = library[activeTab] || [];
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'okras-card';
            card.innerHTML = `<div style="height:50px; background:url(${item.img}) center no-repeat; background-size:contain;"></div><div>${item.name}</div>`;
            card.onclick = () => {
                const layer = layers.find(l => l.id === activeTab);
                layer.currentImg = item.img;
                document.getElementById('layer-' + activeTab).style.backgroundImage = `url(${item.img})`;
            };
            container.appendChild(card);
        });
    }

    // Кнопки "Выше/Ниже" для слоев
    function renderLayerControls() {
        const container = document.getElementById('layers-stack');
        container.innerHTML = '';
        // Сортируем для отображения: самые высокие сверху
        [...layers].sort((a,b) => b.z - a.z).forEach(layer => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `
                <span>${layer.name} (Z: ${layer.z})</span>
                <div class="layer-btns">
                    <button onclick="moveLayer('${layer.id}', 1)">↑</button>
                    <button onclick="moveLayer('${layer.id}', -1)">↓</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function moveLayer(id, delta) {
        const layer = layers.find(l => l.id === id);
        layer.z += delta;
        document.getElementById('layer-' + id).style.zIndex = layer.z;
        renderLayerControls();
    }

    function confirmCharacter() {
        const currentId = localStorage.getItem('userId');
        let profile = JSON.parse(localStorage.getItem('catProfile_' + currentId));
        // Сохраняем всю сборку слоев
        profile.appearance = layers; 
        localStorage.setItem('catProfile_' + currentId, JSON.stringify(profile));
        window.location.href = 'profile.html';
    }

    init();
</script>
</body>
</html>
