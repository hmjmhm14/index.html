<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Выбор Окраса</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .editor-container {
            width: 1000px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 350px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .preview-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        .cat-display {
            width: 400px;
            height: 400px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: 0.5s;
        }

        .preview-label {
            margin-top: 20px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .selector-side {
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .selector-title {
            font-size: 18px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            text-align: center;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-right: 10px;
        }

        .okras-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .okras-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: white;
        }

        .okras-card.active {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.2);
        }

        .okras-img-mini {
            width: 80px;
            height: 80px;
            background: #000;
            margin: 0 auto 10px;
            border-radius: 5px;
            background-size: cover;
        }

        .save-btn {
            margin-top: 25px;
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover { background: #45a049; }

        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="preview-side">
        <div class="cat-display" id="cat-preview">
            <span style="color: #666;" id="placeholder-text">ВЫБЕРИТЕ ОКРАС</span>
        </div>
        <div class="preview-label" id="selected-name">ОКРАС</div>
    </div>

    <div class="selector-side">
        <div class="selector-title">Доступные окрасы</div>
        <div class="scroll-area" id="okras-list">
            </div>
        <button class="save-btn" onclick="confirmOkras()">Завершить создание</button>
    </div>
</div>

<script>
    // Массив твоих окрасов
    const okrasData = [
        { id: 'gray', name: 'Серый', img: 'https://i.ibb.co/qYhV1ny8/image.jpg' },
        { id: 'black', name: 'Черный', img: 'https://i.ibb.co/RGXR1DyG/image.jpg' },
        { id: 'forest', name: 'Лесной', img: 'https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg' }
    ];

    let currentSelected = null;

    const listContainer = document.getElementById('okras-list');
    okrasData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'okras-card';
        card.innerHTML = `
            <div class="okras-img-mini" style="background-image: url('${item.img}')"></div>
            <div style="font-size: 12px;">${item.name}</div>
        `;
        card.onclick = () => selectOkras(item, card);
        listContainer.appendChild(card);
    });

    function selectOkras(item, element) {
        document.querySelectorAll('.okras-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        
        const preview = document.getElementById('cat-preview');
        preview.style.backgroundImage = `url('${item.img}')`;
        document.getElementById('placeholder-text').style.display = 'none';
        document.getElementById('selected-name').textContent = item.name;
        
        currentSelected = item;
    }

    function confirmOkras() {
        if (!currentSelected) {
            alert("Пожалуйста, выберите окрас!");
            return;
        }

        const currentId = localStorage.getItem('userId');
        if (!currentId) {
            window.location.href = 'menu_regist.html';
            return;
        }

        let profile = JSON.parse(localStorage.getItem('catProfile_' + currentId));
        
        if (!profile) {
            alert("Сначала заполните анкету персонажа!");
            window.location.href = 'register_setup.html';
            return;
        }

        // Записываем окрас в профиль
        profile.okras = currentSelected.img;
        localStorage.setItem('catProfile_' + currentId, JSON.stringify(profile));

        // МГНОВЕННЫЙ ПЕРЕХОД В ПРОФИЛЬ
        window.location.href = 'profile.html';
    }
</script>

</body>
</html>
