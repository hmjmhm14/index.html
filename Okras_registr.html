<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - ПОЛНЫЙ РЕДАКТОР</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        .editor-container {
            width: 1250px; height: 900px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 420px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .preview-side { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .cat-viewport { width: 600px; height: 600px; position: relative; }
        .layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; }
        .selector-side { display: flex; flex-direction: column; padding: 20px; border-left: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0,0,0,0.3); overflow: hidden; }
        .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .tab-btn { background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .tab-btn.active { background: #4caf50; }
        .scroll-area { flex: 1; overflow-y: auto; padding-right: 10px; }
        .sub-label { font-size: 11px; color: #888; text-transform: uppercase; margin: 15px 0 8px; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 8px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.2s; }
        .card:hover { background: rgba(255, 255, 255, 0.1); }
        .card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .mini-img { height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 4px; }
        .layers-panel { height: 150px; margin-top: 10px; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 8px; overflow-y: auto; }
        .layer-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
        .layer-btns button { background: #222; border: 1px solid #444; color: white; width: 22px; height: 22px; cursor: pointer; border-radius: 3px; font-size: 10px; }
        .finish-btn { margin-top: 10px; background: #4caf50; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>

    let layers = [
        { id: 'body', name: 'Окрас тела', z: 1, img: lib.body.colors[0].img, movable: false },
        { id: 'outline', name: 'Контур', z: 2, img: 'https://psv4.userapi.com/s/v1/d2/u5MmjzAnQPxd78Vum6JpQEWND6fUYiR240LOMRlpBRz4rYk-XuuYyUy_RPl_aiYklec5yg8AcHioyzgTE7mAdS2EzmzkrSNkKxhvNN658UgrQAjaugmBPahou67ye1ET-9YwX5xbvZkO/IMG_8072.png', movable: false },
        { id: 'eyes', name: 'Глаза', z: 3, img: lib.eyes.colors[0].img, movable: false },
        { id: 'tail_color', name: 'Хвост (Окрас)', z: 4, img: '', movable: false },
        { id: 'tail', name: 'Хвост (Модель)', z: 5, img: '', movable: true, modelId: '' },
        { id: 'belly_color', name: 'Живот (Окрас)', z: 6, img: '', movable: false },
        { id: 'belly', name: 'Живот (Модель)', z: 7, img: '', movable: true, modelId: '' },
        { id: 'mane_color', name: 'Грива (Окрас)', z: 8, img: '', movable: false },
        { id: 'mane', name: 'Грива (Модель)', z: 9, img: '', movable: true, modelId: '' },
        { id: 'cheeks_color', name: 'Щеки (Окрас)', z: 10, img: '', movable: false },
        { id: 'cheeks', name: 'Щеки (Модель)', z: 11, img: '', movable: true, modelId: '' },
        { id: 'bangs_color', name: 'Челка (Окрас)', z: 12, img: '', movable: false },
        { id: 'bangs', name: 'Челка (Модель)', z: 13, img: '', movable: true, modelId: '' }
    ];

    let activeTab = 'body';

    function renderAll() {
        const v = document.getElementById('viewport');
        v.innerHTML = '';
        [...layers].sort((a,b) => a.z - b.z).forEach(l => {
            if(!l.img) return;
            const d = document.createElement('div');
            d.className = 'layer';
            d.style.zIndex = Math.floor(l.z);
            d.style.backgroundImage = `url(${l.img})`;
            v.appendChild(d);
        });

        const t = document.getElementById('tabs');
        t.innerHTML = '';
        Object.keys(lib).forEach(k => {
            const b = document.createElement('button');
            b.className = `tab-btn ${activeTab === k ? 'active' : ''}`;
            b.innerText = lib[k].name;
            b.onclick = () => { activeTab = k; renderAll(); };
            t.appendChild(b);
        });

        const ctrl = document.getElementById('controls');
        ctrl.innerHTML = '';
        const data = lib[activeTab];
        const layer = layers.find(l => l.id === activeTab);

        if (data.models) {
            ctrl.innerHTML += `<div class="sub-label">Выберите модель</div>`;
            const mGrid = document.createElement('div');
            mGrid.className = 'grid';
            data.models.forEach(m => {
                const card = document.createElement('div');
                card.className = `card ${layer.modelId === m.id ? 'active' : ''}`;
                card.innerHTML = `<div class="mini-img" style="background-image:url(${m.model})"></div><div>${m.name}</div>`;
                card.onclick = () => {
                    layer.modelId = m.id;
                    layer.img = m.model;
                    const cLayer = layers.find(l => l.id === activeTab + '_color');
                    if(cLayer) cLayer.img = data.colors[m.id][0].img;
                    renderAll();
                };
                mGrid.appendChild(card);
            });
            ctrl.appendChild(mGrid);

            if (layer.modelId) {
                ctrl.innerHTML += `<div class="sub-label">Выберите окрас</div>`;
                const cGrid = document.createElement('div');
                cGrid.className = 'grid';
                const cLayer = layers.find(l => l.id === activeTab + '_color');
                data.colors[layer.modelId].forEach(c => {
                    const card = document.createElement('div');
                    card.className = `card ${cLayer.img === c.img ? 'active' : ''}`;
                    card.innerHTML = `<div class="mini-img" style="background-image:url(${c.img})"></div><div>${c.name}</div>`;
                    card.onclick = () => { cLayer.img = c.img; renderAll(); };
                    cGrid.appendChild(card);
                });
                ctrl.appendChild(cGrid);
            }
        } else {
            ctrl.innerHTML += `<div class="sub-label">Выберите цвет</div>`;
            const g = document.createElement('div');
            g.className = 'grid';
            data.colors.forEach(c => {
                const card = document.createElement('div');
                card.className = `card ${layer.img === c.img ? 'active' : ''}`;
                card.innerHTML = `<div class="mini-img" style="background-image:url(${c.img})"></div><div>${c.name}</div>`;
                card.onclick = () => { layer.img = c.img; renderAll(); };
                g.appendChild(card);
            });
            ctrl.appendChild(g);
        }

        const ui = document.getElementById('layers-ui');
        ui.innerHTML = '';
        [...layers].filter(l => l.movable).sort((a,b) => b.z - a.z).forEach(l => {
            const row = document.createElement('div');
            row.className = 'layer-item';
            row.innerHTML = `<span>${l.name}</span><div class="layer-btns">
                <button onclick="moveLayer('${l.id}', 1)">↑</button>
                <button onclick="moveLayer('${l.id}', -1)">↓</button>
            </div>`;
            ui.appendChild(row);
        });
    }

    function moveLayer(id, dir) {
        const target = layers.find(l => l.id === id);
        target.z += dir;
        const colorL = layers.find(l => l.id === id + '_color');
        if(colorL) colorL.z = target.z - 0.1;
        renderAll();
    }

    function saveAndExit() { alert("Персонаж успешно сохранен!"); }
    window.onload = renderAll;
</script>
