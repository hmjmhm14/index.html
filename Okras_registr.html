<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Редактор</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .editor-container {
            width: 1100px; height: 850px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 380px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* ПРЕДПРОСМОТР БЕЗ ЛИШНИХ РАМОК */
        .preview-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .cat-viewport {
            width: 500px; height: 500px;
            position: relative;
            background: transparent;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat;
            background-position: center; pointer-events: none;
        }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .selector-side {
            display: flex; flex-direction: column; padding: 25px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0,0,0,0.3);
        }

        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            padding: 8px 10px; border-radius: 5px; cursor: pointer; font-size: 10px;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #4caf50; }

        .scroll-area {
            height: 350px; overflow-y: auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            padding-right: 5px; margin-bottom: 20px;
        }

        .okras-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 10px;
            cursor: pointer; text-align: center; border: 1px solid transparent;
        }
        .okras-card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .mini-img { height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 5px; }

        /* СПИСОК СЛОЕВ */
        .layers-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .layers-list {
            background: rgba(255,255,255,0.03); border-radius: 10px;
            overflow-y: auto; flex: 1;
        }
        .layer-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .layer-btns button {
            background: #222; border: 1px solid #444; color: white;
            width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
        }
        .layer-btns button:hover { background: #444; }

        .finish-btn {
            margin-top: 20px; background: #4caf50; border: none; color: white;
            padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="preview-side">
        <div class="cat-viewport" id="viewport"></div>
        <div style="margin-top: 20px; color: #444; font-weight: bold; letter-spacing: 2px;">РЕДАКТОР ПЕРСОНАЖА</div>
    </div>

    <div class="selector-side">
        <div class="tabs" id="tabs"></div>
        <div class="scroll-area" id="items"></div>
        
        <div class="layers-label">Порядок слоев</div>
        <div class="layers-list" id="layers-ui"></div>

        <button class="finish-btn" onclick="saveAndExit()">ЗАВЕРШИТЬ СОЗДАНИЕ</button>
    </div>
</div>

<script>
    let layers = [
        { id: 'bangs', name: 'Челка', z: 80, img: '' },
        { id: 'ears', name: 'Уши', z: 70, img: '' },
        { id: 'cheeks', name: 'Щеки', z: 60, img: '' },
        { id: 'mane', name: 'Грива', z: 50, img: '' },
        { id: 'base', name: 'Моделька кота', z: 40, img: 'https://psv4.userapi.com/s/v1/d2/u5MmjzAnQPxd78Vum6JpQEWND6fUYiR240LOMRlpBRz4rYk-XuuYyUy_RPl_aiYklec5yg8AcHioyzgTE7mAdS2EzmzkrSNkKxhvNN658UgrQAjaugmBPahou67ye1ET-9YwX5xbvZkO/IMG_8072.png' },
        { id: 'body', name: 'Окрас тела', z: 30, img: '' },
        { id: 'belly', name: 'Живот', z: 20, img: '' },
        { id: 'tail', name: 'Хвост', z: 10, img: '' }
    ];

    const lib = {
        body: [
            { name: 'Черный', img: 'https://psv4.userapi.com/s/v1/d2/1JBuWj7BxdwpksiW2e3415tfG8m6s3XHIv2ed8o841j0w3Wm-FxQM0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8078.png' },
            { name: 'Белый', img: 'https://psv4.userapi.com/s/v1/d2/YuXGokbsOuLU8Kj9jWXCv7kgpDvBOKitH2KKzGaVbVqqcUMnZX5yXYoTt-SIZ_7y73wwtS3CdnnO1PefrFRlv5fbmdcLH_cgW6Lr_T4s-xZ1tBc45XsBJwsd9rcBpNYvUBn0XBrSOKg2/IMG_8103.png' },
            { name: 'Коричневый', img: 'https://psv4.userapi.com/s/v1/d2/8G22l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8080.png' },
            { name: 'Грязный', img: 'https://psv4.userapi.com/s/v1/d2/X29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8081.png' },
            { name: 'Фиолетовый', img: 'https://psv4.userapi.com/s/v1/d2/P29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8083.png' },
            { name: 'Голубой', img: 'https://psv4.userapi.com/s/v1/d2/k29_l9309mO64T1fE6p1_7H-fK0Y_z-oA7R3lC9v0P9u2S3_v0E_NIPH-qSos6nvb8PlckGvL8ek_v0iX8vlf3PPhFZPemAJdhEx2l66Larwjs56FiJ_Q3GuEid55hxgl73dn4zS/IMG_8084.png' },
            { name: 'Рыжий', img: 'https://psv4.userapi.com/s/v1/d2/kELWKDbzGvukdiC6mkY7NES0E1MIkkNHK9jPVwN3dLQEgRbHduTKIzDk5DeZ_cEYdtJJQ8WVxO2kGefa1r3wnzI2TmYmGhyOKbDsjcUf2a7AWavEyg_DTBsVAzXR5lk5tDQRl2SIZ7hU/IMG_8086.png' }
        ],
        tail: [], belly: [], cheeks: [], mane: [], ears: [], bangs: []
    };

    let activeTab = 'body';

    function renderAll() {
        // Рендер кота
        const v = document.getElementById('viewport');
        v.innerHTML = '';
        layers.forEach(l => {
            const d = document.createElement('div');
            d.className = 'layer';
            d.style.zIndex = l.z;
            d.style.backgroundImage = l.img ? `url(${l.img})` : 'none';
            v.appendChild(d);
        });

        // Рендер кнопок категорий
        const t = document.getElementById('tabs');
        t.innerHTML = '';
        layers.filter(l => l.id !== 'base').forEach(l => {
            const b = document.createElement('button');
            b.className = `tab-btn ${activeTab === l.id ? 'active' : ''}`;
            b.innerText = l.name;
            b.onclick = () => { activeTab = l.id; renderAll(); };
            t.appendChild(b);
        });

        // Рендер списка окрасов
        const i = document.getElementById('items');
        i.innerHTML = '';
        (lib[activeTab] || []).forEach(item => {
            const card = document.createElement('div');
            card.className = `okras-card ${layers.find(l => l.id === activeTab).img === item.img ? 'active' : ''}`;
            card.innerHTML = `<div class="mini-img" style="background-image:url(${item.img})"></div><div style="font-size:10px;">${item.name}</div>`;
            card.onclick = () => { layers.find(l => l.id === activeTab).img = item.img; renderAll(); };
            i.appendChild(card);
        });

        // Рендер интерфейса слоев
        const ui = document.getElementById('layers-ui');
        ui.innerHTML = '';
        [...layers].sort((a,b) => b.z - a.z).forEach((l, index, arr) => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `
                <span>${l.name}</span>
                <div class="layer-btns">
                    <button onclick="move('${l.id}', 1)">↑</button>
                    <button onclick="move('${l.id}', -1)">↓</button>
                </div>
            `;
            ui.appendChild(item);
        });
    }

    // Функция перемещения слоя (Починена)
    function move(id, direction) {
        const idx = layers.findIndex(l => l.id === id);
        if (idx === -1) return;
        
        // Меняем Z-index
        layers[idx].z += direction * 5; 
        renderAll();
    }

    function saveAndExit() {
        const id = localStorage.getItem('userId');
        let p = JSON.parse(localStorage.getItem('catProfile_' + id)) || {};
        p.appearance = layers;
        localStorage.setItem('catProfile_' + id, JSON.stringify(p));
        window.location.href = 'profile.html';
    }

    renderAll();
</script>
</body>
</html>
