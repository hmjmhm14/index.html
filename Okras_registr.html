<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Редактор</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .editor-container {
            width: 1100px; height: 850px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 380px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .preview-side {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .cat-viewport {
            width: 500px; height: 500px;
            position: relative;
            background: transparent;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat;
            background-position: center; pointer-events: none;
        }

        .selector-side {
            display: flex; flex-direction: column; padding: 25px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0,0,0,0.3);
        }

        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            padding: 8px 10px; border-radius: 5px; cursor: pointer; font-size: 10px;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #4caf50; }

        .sub-label { font-size: 11px; color: #888; text-transform: uppercase; margin: 10px 0 8px; border-bottom: 1px solid #333; }
        
        .scroll-area { height: 380px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        .card {
            background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 10px;
            cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.2s;
        }
        .card:hover { background: rgba(255, 255, 255, 0.1); }
        .card.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .mini-img { height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 5px; }

        .layers-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .layers-list { background: rgba(255,255,255,0.03); border-radius: 10px; overflow-y: auto; flex: 1; }
        .layer-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .layer-btns button {
            background: #222; border: 1px solid #444; color: white;
            width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
        }

        .finish-btn {
            margin-top: 20px; background: #4caf50; border: none; color: white;
            padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>

            const d = document.createElement('div');
            d.className = 'layer';
            d.style.zIndex = l.z;
            d.style.backgroundImage = l.img ? `url(${l.img})` : 'none';
            v.appendChild(d);
        });

        const t = document.getElementById('tabs');
        t.innerHTML = '';
        layers.forEach(l => {
            if(l.id === 'base') return; 
            const b = document.createElement('button');
            b.className = `tab-btn ${activeTab === l.id ? 'active' : ''}`;
            b.innerText = l.name;
            b.onclick = () => { activeTab = l.id; renderAll(); };
            t.appendChild(b);
        });

        const controls = document.getElementById('controls');
        controls.innerHTML = ''; 
        const activeLayer = layers.find(l => l.id === activeTab);
        const data = lib[activeTab];

        if (activeTab === 'tail') {
            const typeLabel = document.createElement('div');
            typeLabel.className = 'sub-label';
            typeLabel.innerText = 'Вид хвоста';
            controls.appendChild(typeLabel);

            const typeGrid = document.createElement('div');
            typeGrid.className = 'grid';
            data.types.forEach(type => {
                const card = document.createElement('div');
                card.className = `card ${activeLayer.currentTypeId === type.id ? 'active' : ''}`;
                card.innerHTML = `<div class="mini-img" style="background-image:url(${type.preview})"></div><div style="font-size:10px;">${type.name}</div>`;
                card.onclick = () => { 
                    activeLayer.currentTypeId = type.id;
                    activeLayer.img = data.colorsByModel[type.id][0].img;
                    renderAll(); 
                };
                typeGrid.appendChild(card);
            });
            controls.appendChild(typeGrid);

            const colorLabel = document.createElement('div');
            colorLabel.className = 'sub-label';
            colorLabel.innerText = 'Окрас хвоста';
            controls.appendChild(colorLabel);

            const colorGrid = document.createElement('div');
            colorGrid.className = 'grid';
            const currentColors = data.colorsByModel[activeLayer.currentTypeId] || [];
            currentColors.forEach(color => {
                const card = document.createElement('div');
                card.className = `card ${activeLayer.img === color.img ? 'active' : ''}`;
                card.innerHTML = `<div class="mini-img" style="background-image:url(${color.img})"></div><div style="font-size:10px;">${color.name}</div>`;
                card.onclick = () => { activeLayer.img = color.img; renderAll(); };
                colorGrid.appendChild(card);
            });
            controls.appendChild(colorGrid);

        } else if (data && data.colors && data.colors.length > 0) {
            const label = document.createElement('div');
            label.className = 'sub-label';
            label.innerText = 'Доступные цвета';
            controls.appendChild(label);

            const grid = document.createElement('div');
            grid.className = 'grid';
            data.colors.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${activeLayer.img === item.img ? 'active' : ''}`;
                card.innerHTML = `<div class="mini-img" style="background-image:url(${item.img})"></div><div style="font-size:10px;">${item.name}</div>`;
                card.onclick = () => { activeLayer.img = item.img; renderAll(); };
                grid.appendChild(card);
            });
            controls.appendChild(grid);
        }

        const ui = document.getElementById('layers-ui');
        ui.innerHTML = '';
        [...layers].filter(l => l.movable).sort((a,b) => b.z - a.z).forEach(l => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `
                <span>${l.name}</span>
                <div class="layer-btns">
                    <button onclick="moveLayer('${l.id}', 1)">↑</button>
                    <button onclick="moveLayer('${l.id}', -1)">↓</button>
                </div>
            `;
            ui.appendChild(item);
        });
    }

    function moveLayer(id, dir) {
        const target = layers.find(l => l.id === id);
        target.z += dir;
        renderAll();
    }

    function saveAndExit() {
        const id = localStorage.getItem('userId');
        let p = JSON.parse(localStorage.getItem('catProfile_' + id)) || {};
        p.appearance = layers;
        localStorage.setItem('catProfile_' + id, JSON.stringify(p));
        alert("Сохранено!");
    }

    window.onload = renderAll;
</script>
</body>
</html>
