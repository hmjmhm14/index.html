<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBR CATS - Вход и Регистрация</title>
    <style>
        body {
            background: url('https://i.ibb.co/q2K768f/spooky-forest-mystery-horror-beauty-nature-generated-by-ai.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* ТЕПЕРЬ ПО ЦЕНТРУ ВЕРТИКАЛЬНО */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .header-template {
            width: 100%;
            max-width: 800px; /* Чуть компактнее */
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }

        .about-section {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .box {
            display: flex;
            background: rgba(0, 0, 0, 0.85);
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            gap: 40px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 20px; 
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        
        input {
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { 
            background: #aaa;
            transform: translateY(-2px);
        }

        .vk-link {
            color: #7289da;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .box { flex-direction: column; gap: 30px; }
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/qYhV1ny8/image.jpg" class="header-template" alt="Header">

    <div class="about-section">
        <h2>О ПРОЕКТЕ</h2>
        <p style="font-size: 14px; color: #ccc;">
            Добро пожаловать в <b>CBR-cats</b>! Создайте своего кота, выберите племя и выживайте в мире, где мертвые восстали. 16+
        </p>
        <a href="https://vk.com/cbrcats" target="_blank" class="vk-link">Наш паблик ВК</a>
    </div>

    <div class="box">
        <div class="col">
            <h2>ВХОД</h2>
            <input type="text" id="l-email" placeholder="Почта">
            <input type="password" id="l-pass" placeholder="Пароль">
            <button onclick="login()">ВОЙТИ</button>
        </div>

        <div class="col">
            <h2>РЕГИСТРАЦИЯ</h2>
            <input type="text" id="r-email" placeholder="Почта">
            <input type="password" id="r-pass1" placeholder="Пароль">
            <input type="password" id="r-pass2" placeholder="Повтор пароля">
            <button onclick="register()">СОЗДАТЬ</button>
        </div>
    </div>

    <script>
        // Скрипты остаются без изменений, они у тебя рабочие
        function register() {
            const email = document.getElementById('r-email').value.trim();
            const p1 = document.getElementById('r-pass1').value;
            const p2 = document.getElementById('r-pass2').value;

            if (email && p1 === p2 && p1 !== "") {
                let accounts = JSON.parse(localStorage.getItem('cbr_accounts')) || [];
                if (accounts.some(acc => acc.email === email)) {
                    alert("Этот адрес уже зарегистрирован!");
                    return;
                }
                let lastId = localStorage.getItem('cbr_last_id') || "-0.01";
                let newId = (parseFloat(lastId) + 0.01).toFixed(2);
                const newAcc = { email: email, pass: p1, id: newId };
                accounts.push(newAcc);
                localStorage.setItem('cbr_accounts', JSON.stringify(accounts));
                localStorage.setItem('cbr_last_id', newId);
                localStorage.setItem('userId', newId);
                window.location.href = 'register_setup.html';
            } else {
                alert("Ошибка заполнения!");
            }
        }

        function login() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value;
            let accounts = JSON.parse(localStorage.getItem('cbr_accounts')) || [];
            const user = accounts.find(acc => acc.email === email && acc.pass === pass);
            if (user) {
                localStorage.setItem('userId', user.id);
                if (localStorage.getItem('catProfile_' + user.id)) {
                    window.location.href = 'profile.html';
                } else {
                    window.location.href = 'register_setup.html';
                }
            } else {
                alert("Неверная почта или пароль!");
            }
        }
    </script>
</body>
</html>
